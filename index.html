<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Whiscraft — Digital Design Vault</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --cobalt: #1A56FF; --cobalt-dim: rgba(26,86,255,0.08); --black: #0A0A0A;
            --gray-200: #E8E8E8; --gray-500: #6B6B6B; --white: #FFFFFF;
            --font-display: 'Cormorant Garamond', serif; --font-body: 'DM Sans', sans-serif;
        }
        html { font-family: var(--font-body); background: var(--white); color: var(--black); }
        .nav { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--gray-200); padding: 0 32px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
        .hero-strip { padding: 60px 32px; border-bottom: 1px solid var(--gray-200); text-align: center; }
        .hero-title { font-family: var(--font-display); font-size: 64px; font-weight: 300; letter-spacing: -0.02em; }
        .single-product-wrap { display: flex; justify-content: center; padding: 60px 20px; }
        .card { width: 100%; max-width: 450px; border: 1px solid var(--gray-200); border-radius: 12px; overflow: hidden; cursor: pointer; transition: transform 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card-img { width: 100%; display: block; }
        .card-info { padding: 20px; text-align: left; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal { background: white; border-radius: 20px; max-width: 900px; width: 100%; display: flex; overflow: hidden; }
        .btn-buy { background: var(--cobalt); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; text-decoration: none; display: block; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [open, setOpen] = useState(false);

            // DATA SECTION - CAREFUL EDITING HERE
            const product = {
                title: "Signature Camo Essential",
                image: "https://images.unsplash.com/photo-1558769132-cb1aea458c5e?w=800", // CHANGE TO YOUR IMG LINK
                amazon: "https://amazon.com", // CHANGE TO YOUR TRACKING LINK
                desc: "Debut collection. Oversized fit, premium breathable cotton."
            };

            return (
                <div>
                    <nav className="nav">
                        <div style={{fontWeight:'bold'}}>WHISCRAFT</div>
                        <div style={{fontSize:'12px', color:'#666'}}>THE VAULT</div>
                    </nav>

                    <div className="hero-strip">
                        <h1 className="hero-title">The Design Vault.</h1>
                    </div>

                    <div className="single-product-wrap">
                        <div className="card" onClick={() => setOpen(true)}>
                            <img src={product.image} className="card-img" />
                            <div className="card-info">
                                <h3>{product.title}</h3>
                                <p style={{color:'#666', fontSize:'14px'}}>Lifestyle</p>
                            </div>
                        </div>
                    </div>

                    {open && (
                        <div className="modal-overlay" onClick={() => setOpen(false)}>
                            <div className="modal" onClick={e => e.stopPropagation()}>
                                <div style={{flex:1}}><img src={product.image} style={{width:'100%'}}/></div>
                                <div style={{flex:1, padding:'40px'}}>
                                    <h2>{product.title}</h2>
                                    <p style={{marginTop:'20px', color:'#666'}}>{product.desc}</p>
                                    <a href={product.amazon} target="_blank" className="btn-buy">ORDER NOW</a>
                                    <button onClick={() => setOpen(false)} style={{marginTop:'20px', background:'none', border:'none', cursor:'pointer', color:'#999'}}>Close</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
