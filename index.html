<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Whiscraft — Digital Design Vault</title>
<link rel="icon" type="image/png" href="https://res.cloudinary.com/dsviustds/image/upload/v1776948035/Whiscraft-logo_logo-Dark_1035x267_xanion.png" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cobalt: #1A56FF;
    --cobalt-dim: rgba(26,86,255,0.08);
    --cobalt-border: rgba(26,86,255,0.2);
    --black: #0A0A0A;
    --gray-800: #1C1C1C;
    --gray-500: #6B6B6B;
    --gray-200: #E8E8E8;
    --gray-50: #F7F7F7;
    --white: #FFFFFF;
    --font-display: 'Cormorant Garamond', serif;
    --font-body: 'DM Sans', sans-serif;
  }
  html { font-family: var(--font-body); background: var(--white); color: var(--black); }
  body { min-height: 100vh; }
  #root { min-height: 100vh; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.96) translateY(8px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .fade-up { animation: fadeUp 0.5s ease both; }
  .fade-in { animation: fadeIn 0.3s ease both; }
  .scale-in { animation: scaleIn 0.35s cubic-bezier(0.16,1,0.3,1) both; }

  /* Nav */
  .nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--gray-200);
    padding: 0 32px;
    height: 60px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-logo img {
    height: 22px;
    width: auto;
    display: block;
  }
  .nav-cats { display: flex; gap: 2px; }
  .cat-btn {
    background: none; border: none; cursor: pointer;
    font-family: var(--font-body); font-size: 12px; font-weight: 400;
    color: var(--gray-500); padding: 6px 14px; border-radius: 100px;
    letter-spacing: 0.04em; text-transform: uppercase;
    transition: all 0.2s;
  }
  .cat-btn:hover { color: var(--black); background: var(--gray-50); }
  .cat-btn.active { color: var(--cobalt); background: var(--cobalt-dim); font-weight: 500; }
  .nav-right { display: flex; align-items: center; gap: 20px; }
  .collection-link {
    font-size: 12px; font-weight: 400; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--gray-500);
    text-decoration: none; cursor: pointer; background: none; border: none;
    transition: color 0.2s;
  }
  .collection-link:hover { color: var(--black); }
  .avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--gray-200); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500; color: var(--gray-500);
    border: 1.5px solid var(--gray-200); transition: border-color 0.2s;
  }
  .avatar:hover { border-color: var(--cobalt); }

  /* Hero strip */
  .hero-strip {
    padding: 48px 32px 32px;
    border-bottom: 1px solid var(--gray-200);
    display: flex; align-items: flex-end; justify-content: space-between;
  }
  .hero-title {
    font-family: var(--font-display);
    font-size: clamp(40px, 5vw, 72px);
    font-weight: 300; line-height: 1; letter-spacing: -0.03em;
    color: var(--black);
  }
  .hero-title em { font-style: italic; color: var(--cobalt); }
  .hero-sub {
    font-size: 12px; color: var(--gray-500); max-width: 220px;
    text-align: right; line-height: 1.7; letter-spacing: 0.01em;
  }

  /* Grid Centering for Launch */
  .grid-wrap { padding: 32px; display: flex; justify-content: center; }
  .masonry { columns: 4; column-gap: 16px; width: 100%; max-width: 1400px; }
  @media (max-width: 1100px) { .masonry { columns: 3; } }
  @media (max-width: 750px) { .masonry { columns: 1; max-width: 450px; } }

  /* Card */
  .card {
    break-inside: avoid; margin-bottom: 16px;
    cursor: pointer; position: relative;
    border-radius: 10px; overflow: hidden;
    border: 1px solid var(--gray-200);
    background: var(--white);
    transition: transform 0.3s cubic-bezier(0.16,1,0.3,1), box-shadow 0.3s;
  }
  .card:hover { transform: translateY(-4px); box-shadow: 0 20px 60px rgba(0,0,0,0.1); }
  .card-img { width: 100%; display: block; object-fit: cover; background: var(--gray-50); }
  
  .media-badge {
    position: absolute; top: 10px; left: 10px;
    padding: 3px 9px; border-radius: 100px;
    font-size: 10px; font-weight: 500; letter-spacing: 0.05em;
    text-transform: uppercase; backdrop-filter: blur(8px);
  }
  .badge-slides { background: rgba(26,86,255,0.9); color: white; }
  
  .card-foot { padding: 12px 14px; border-top: 1px solid var(--gray-200); }
  .card-title { font-size: 13px; font-weight: 400; color: var(--black); letter-spacing: -0.01em; margin-bottom: 3px; }
  .card-cat { font-size: 10px; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.05em; }

  /* Modal Styles */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    padding: 24px; animation: fadeIn 0.25s ease;
  }
  .modal {
    background: var(--white);
    border-radius: 16px; overflow: hidden;
    width: 100%; max-width: 1000px; max-height: 90vh;
    display: flex; flex-direction: row;
    box-shadow: 0 40px 120px rgba(0,0,0,0.25);
    animation: scaleIn 0.35s cubic-bezier(0.16,1,0.3,1);
  }
  @media (max-width: 850px) { .modal { flex-direction: column; overflow-y: auto; } }

  .modal-left { flex: 1.2; background: var(--gray-50); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; min-height: 400px; }
  .modal-media { width: 100%; height: 100%; object-fit: cover; display: block; }
  
  .slide-nav { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; }
  .slide-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.5); cursor: pointer; border: none; }
  .slide-dot.active { background: white; width: 18px; border-radius: 3px; }
  
  .slide-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.9); border: none; cursor: pointer; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--black); }
  .slide-arrow.left { left: 12px; }
  .slide-arrow.right { right: 12px; }

  .modal-right { width: 360px; flex-shrink: 0; display: flex; flex-direction: column; overflow-y: auto; border-left: 1px solid var(--gray-200); }
  @media (max-width: 850px) { .modal-right { width: 100%; border-left: none; } }
  
  .modal-close { position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,0.9); border: none; cursor: pointer; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10; }
  
  .modal-head { padding: 24px 24px 0; }
  .modal-title { font-family: var(--font-display); font-size: 26px; font-weight: 400; color: var(--black); margin-bottom: 6px; }
  
  .cta-area { padding: 20px 24px; display: flex; flex-direction: column; gap: 10px; }
  .btn-primary { width: 100%; padding: 13px; border-radius: 8px; background: var(--cobalt); color: white; font-family: var(--font-body); font-size: 12px; font-weight: 500; text-transform: uppercase; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-secondary { width: 100%; padding: 12px; border-radius: 8px; background: var(--white); color: var(--black); border: 1.5px solid var(--gray-200); cursor: pointer; font-size: 11px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px; }

  .tab-nav { display: flex; border-bottom: 1px solid var(--gray-200); padding: 0 24px; }
  .tab-btn { background: none; border: none; cursor: pointer; font-size: 11px; color: var(--gray-500); padding: 12px 14px; border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .tab-btn.active { color: var(--black); border-bottom-color: var(--black); }
  .tab-content { padding: 20px 24px; font-size: 13px; color: var(--gray-500); line-height: 1.7; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

// ── DATA — THE VAULT ───────────────────────────────────────────────────
const mockData = [
  {
    id: 1,
    title: "Signature Camo Essential",
    category: "Lifestyle",
    mediaType: "slides",
    mediaUrl: "https://res.cloudinary.com/dsviustds/image/upload/v1776947518/Side_1_c8qyfs.png", 
    amazonLink: "https://amzn.to/your-short-link", 
    isPremium: false,
    height: 500,
    description: "The debut Whiscraft essential. A heavy-weight, breathable cotton blend crafted for the perfect oversized silhouette. Engineered for absolute comfort without compromising the street aesthetic.",
    tags: ["Camo", "Oversized", "Debut", "Streetwear"],
    inspiration: "Focused on 'The Slouch' — a design study in finding the balance between architectural structure and effortless ease.",
    slides: [
      "https://res.cloudinary.com/dsviustds/image/upload/v1776947518/Side_1_c8qyfs.png",
      "https://res.cloudinary.com/dsviustds/image/upload/v1776947517/Side_2_ftdjr3.png",
      "https://res.cloudinary.com/dsviustds/image/upload/v1776947516/Side_3_lelwzf.png",
      "https://res.cloudinary.com/dsviustds/image/upload/v1776947517/Side_4_yst9el.png",
      "https://res.cloudinary.com/dsviustds/image/upload/v1776947516/Side_5_nhkzqb.png",
      "https://res.cloudinary.com/dsviustds/image/upload/v1776947516/Side_6_qt7tvh.png",
    ],
    qa: [
      { q: "How does the sizing run?", a: "Intentionally oversized. For a standard fit, size down; for the signature look, stay true to size." },
      { q: "Fabric care?", a: "Cold wash, hang dry recommended." }
    ]
  },
];

const Icon = ({ name, size = 14 }) => {
  const paths = {
    vault: <><rect x="2" y="7" width="20" height="14" rx="2"/><circle cx="12" cy="14" r="2"/></>,
    shoppingBag: <><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></>,
    download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
    x: <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
    chevLeft: <polyline points="15 18 9 12 15 6"/>,
    chevRight: <polyline points="9 18 15 12 9 6"/>,
    star: <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>,
  };
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
      {paths[name]}
    </svg>
  );
};

const Card = ({ item, onClick, delay }) => {
  return (
    <div className="card fade-up" style={{ animationDelay: `${delay}ms` }} onClick={() => onClick(item)}>
      <div style={{ position: 'relative' }}>
        <img src={item.slides[0]} alt={item.title} className="card-img" style={{ height: item.height }} />
        <span className="media-badge badge-slides">Slides 1/{item.slides.length}</span>
      </div>
      <div className="card-foot">
        <div className="card-title">{item.title}</div>
        <div className="card-cat">{item.category}</div>
      </div>
    </div>
  );
};

const PostModal = ({ item, onClose }) => {
  const [slide, setSlide] = useState(0);
  const [tab, setTab] = useState('details');
  const prev = () => setSlide(s => (s - 1 + item.slides.length) % item.slides.length);
  const next = () => setSlide(s => (s + 1) % item.slides.length);

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-left">
          <button className="modal-close" onClick={onClose}><Icon name="x" size={13} /></button>
          <img src={item.slides[slide]} alt={item.title} className="modal-media" />
          <button className="slide-arrow left" onClick={prev}><Icon name="chevLeft" size={12} /></button>
          <button className="slide-arrow right" onClick={next}><Icon name="chevRight" size={12} /></button>
          <div className="slide-nav">
            {item.slides.map((_, i) => (
              <button key={i} className={`slide-dot ${i === slide ? 'active' : ''}`} onClick={() => setSlide(i)} />
            ))}
          </div>
        </div>
        <div className="modal-right">
          <div className="modal-head">
            <div style={{fontSize:10, color:'var(--cobalt)', marginBottom:8, textTransform:'uppercase'}}><Icon name="star" size={10} /> {item.category}</div>
            <div className="modal-title">{item.title}</div>
          </div>
          <div className="cta-area">
            <a href={item.amazonLink} target="_blank" style={{textDecoration:'none'}}>
              <button className="btn-primary"><Icon name="shoppingBag" size={13} /> Order Product</button>
            </a>
            <button className="btn-secondary"><Icon name="download" size={13} /> Download Asset</button>
          </div>
          <div className="tab-nav">
            {['details', 'q&a'].map(t => (
              <button key={t} className={`tab-btn ${tab === t ? 'active' : ''}`} onClick={() => setTab(t)}>{t.toUpperCase()}</button>
            ))}
          </div>
          <div className="tab-content">
            {tab === 'details' ? <p>{item.description}</p> : 
              item.qa.map((q, i) => <div key={i} style={{marginBottom:10}}><strong>Q: {q.q}</strong><br/>A: {q.a}</div>)
            }
          </div>
        </div>
      </div>
    </div>
  );
};

function App() {
  const [selected, setSelected] = useState(null);
  return (
    <div>
      <nav className="nav">
        <div className="nav-logo">
          <img src="https://res.cloudinary.com/dsviustds/image/upload/v1776948035/Whiscraft-logo_logo-Dark_1035x267_xanion.png" alt="Whiscraft" />
        </div>
        <div className="nav-cats">
          {['All', 'Lifestyle'].map(c => <button key={c} className="cat-btn active">{c}</button>)}
        </div>
        <div className="nav-right">
          <div className="collection-link">My Collection <span className="count-chip">0</span></div>
          <div className="avatar">W</div>
        </div>
      </nav>

      <div className="hero-strip fade-in">
        <div className="hero-title">The Design<br /><em>Vault.</em></div>
        <div className="hero-sub">Premium visual assets & curated physical goods.<br />Browse freely, order intentionally.</div>
      </div>

      <div className="grid-wrap">
        <div className="masonry">
          {mockData.map((item, i) => (
            <Card key={item.id} item={item} onClick={setSelected} delay={i * 60} />
          ))}
        </div>
      </div>

      {selected && <PostModal item={selected} onClose={() => setSelected(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
