<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Whiscraft — Digital Design Vault</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  /* ALL YOUR EXISTING STYLES REMAIN THE SAME */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cobalt: #1A56FF;
    --cobalt-dim: rgba(26,86,255,0.08);
    --cobalt-border: rgba(26,86,255,0.2);
    --black: #0A0A0A;
    --gray-800: #1C1C1C;
    --gray-50: #F7F7F7;
    --white: #FFFFFF;
    --font-display: 'Cormorant Garamond', serif;
    --font-body: 'DM Sans', sans-serif;
  }
  /* ... (Keeping your CSS from above) ... */
  /* ADDED CSS FOR SINGLE PRODUCT CENTERING */
  .single-product-container {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 60px 20px;
    min-height: 50vh;
  }
  .featured-card {
    max-width: 450px;
    width: 100%;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

// ── THE VAULT DATA — UPDATE YOUR SINGLE PRODUCT HERE ──────────────────────────
const mockData = [
  {
    id: 1,
    title: "Signature Camo Essential",
    category: "Lifestyle",
    mediaType: "slides",
    // UPDATE THIS: Your primary model image link
    mediaUrl: "https://your-primary-image.jpg", 
    // UPDATE THIS: Your Amazon Associates Link
    amazonLink: "https://amzn.to/YOUR_ID", 
    isPremium: false,
    height: 500,
    description: "The debut Whiscraft essential. Oversized silhouette crafted from a premium breathable cotton blend. Designed for effortless comfort and street-ready aesthetics.",
    // UPDATE THIS: Add your extra slide links here
    slides: [
      "https://your-primary-image.jpg",
      "https://your-slide-2.jpg",
      "https://your-slide-3.jpg"
    ],
    tags: ["clothing", "camo", "streetwear"],
    inspiration: "Focused on 'The Slouch' — finding the perfect balance between structure and absolute ease.",
    qa: [
      { q: "What is the fit like?", a: "This is an intentionally oversized fit. If you prefer a standard look, we recommend sizing down." },
      { q: "Care instructions?", a: "Machine washable. We recommend hanging to dry to maintain fabric texture." }
    ]
  }
];

// ... (Keeping your Icon and Component logic from above) ...

function App() {
  const [category, setCategory] = useState('All');
  const [selected, setSelected] = useState(null);
  const [showAuth, setShowAuth] = useState(false);
  const [authPremium, setAuthPremium] = useState(false);

  const filtered = category === 'All' ? mockData : mockData.filter(d => d.category === category);

  const handleGate = (item) => {
    setSelected(null);
    setTimeout(() => { setAuthPremium(item.isPremium); setShowAuth(true); }, 100);
  };

  return (
    <div style={{ minHeight: '100vh', background: 'var(--white)' }}>
      {/* NAV */}
      <nav className="nav">
        <div className="nav-logo">
          <div className="vault-badge"><Icon name="vault" size={12} /></div>
          Whiscraft
        </div>
        <div className="nav-cats">
          {['All', 'Lifestyle', 'Tech', 'Motion'].map(c => (
            <button key={c} className={`cat-btn ${category === c ? 'active' : ''}`} onClick={() => setCategory(c)}>{c}</button>
          ))}
        </div>
        <div className="nav-right">
          <button className="collection-link" onClick={() => setShowAuth(true)}>
            My Collection <span className="count-chip">0</span>
          </button>
        </div>
      </nav>

      <div className="hero-strip fade-in">
        <div className="hero-title">The Design<br /><em>Vault.</em></div>
        <div className="hero-sub">Signature streetwear & digital assets.<br />Browse freely, order intentionally.</div>
      </div>

      <div className="single-product-container">
        {filtered.length === 0 ? (
          <div className="empty-state">Coming soon to {category}.</div>
        ) : (
          <div className="featured-card">
             <Card item={filtered[0]} onClick={setSelected} delay={100} />
          </div>
        )}
      </div>

      {selected && <PostModal item={selected} onClose={() => setSelected(null)} onGate={handleGate} />}
      {showAuth && <AuthModal isPremium={authPremium} onClose={() => setShowAuth(false)} />}
    </div>
  );
}

// ... (Rest of your ReactDOM render code)
</script>
</body>
</html>
